name: Publish to PyPI

# Builds the package and publishes it to PyPI on a vX.Y.Z tag push.
# Pushing a tag fires this workflow AND release.yml in parallel:
#   git tag v0.3.1 && git push origin v0.3.1
#     -> release.yml publishes a GitHub Release (notes from CHANGELOG)
#     -> this workflow builds + uploads to PyPI
# Triggering on the tag push directly (not on release: published) avoids GitHub's
# rule that a release created by GITHUB_TOKEN can't trigger other workflows.
# workflow_dispatch is kept as a manual fallback.
#
# ONE-TIME SETUP (no API token needed — uses PyPI Trusted Publishing / OIDC):
#   1. Make sure the project name "inav-mcp" is available / owned by you on PyPI.
#   2. On PyPI -> your project (or "Publishing" for a new project) add a
#      Trusted Publisher with:
#        Owner:        starlordz12
#        Repository:   inav-mcp
#        Workflow:     publish.yml
#        Environment:  pypi
#   3. (Optional) GitHub repo Settings -> Environments -> create "pypi" and add
#      required reviewers for a manual approval gate before each publish.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/inav-mcp/
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
