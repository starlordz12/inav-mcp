<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- window -->
  <rect x="1" y="1" width="818" height="468" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- title bar -->
  <line x1="1" y1="46" x2="819" y2="46" stroke="#30363d" stroke-width="1"/>
  <circle cx="26" cy="24" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="24" r="6" fill="#febc2e"/>
  <circle cx="66" cy="24" r="6" fill="#28c840"/>
  <text x="410" y="28" fill="#8b949e" font-size="13" text-anchor="middle">iNAV MCP server — example session</text>

  <!-- user -->
  <rect x="22" y="72" width="3" height="40" rx="1.5" fill="#58a6ff"/>
  <text x="40" y="84" fill="#58a6ff" font-size="12" font-weight="600">You</text>
  <text x="40" y="106" fill="#e6edf3" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Connect to my FC on COM4 and tell me why it won't arm.</text>

  <!-- tool calls -->
  <rect x="40" y="126" width="214" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
  <circle cx="58" cy="140" r="4" fill="#7ee787"/>
  <text x="72" y="144" fill="#8b949e" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">connect(port="COM4")</text>

  <rect x="266" y="126" width="196" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
  <circle cx="284" cy="140" r="4" fill="#7ee787"/>
  <text x="298" y="144" fill="#8b949e" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">why_wont_it_arm()</text>

  <!-- claude -->
  <rect x="22" y="176" width="3" height="252" rx="1.5" fill="#d2a8ff"/>
  <text x="40" y="188" fill="#d2a8ff" font-size="12" font-weight="600">Claude</text>

  <text x="40" y="212" fill="#e6edf3" font-size="15">Connected — SpeedyBee F405 Wing, iNAV 6.1.0.</text>
  <text x="40" y="238" fill="#e6edf3" font-size="15">It won't arm yet. Three blockers are active:</text>

  <text x="52" y="268" fill="#ffa657" font-size="15">•</text>
  <text x="72" y="268" fill="#c9d1d9" font-size="15">Throttle not at minimum</text>
  <text x="52" y="292" fill="#ffa657" font-size="15">•</text>
  <text x="72" y="292" fill="#c9d1d9" font-size="15">No RX signal on the configured channels</text>
  <text x="52" y="316" fill="#ffa657" font-size="15">•</text>
  <text x="72" y="316" fill="#c9d1d9" font-size="15">Accelerometer not calibrated</text>

  <text x="40" y="350" fill="#e6edf3" font-size="15">Lower the throttle and check your TX link first,</text>
  <text x="40" y="374" fill="#e6edf3" font-size="15">then re-check arming.</text>
  <text x="40" y="408" fill="#8b949e" font-size="15">Want me to run accelerometer calibration now?</text>
</svg>
